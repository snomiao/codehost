name: Release

# Publishes to npm via semantic-release on every push to main. Needs an
# NPM_TOKEN repo secret (Automation token from npmjs). GITHUB_TOKEN is provided
# automatically. The release commit is tagged [skip ci] so it doesn't loop.
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require NPM_TOKEN
        if: ${{ env.NPM_TOKEN == '' }}
        run: |
          echo "::warning::NPM_TOKEN secret is not set — skipping the npm release. \
          Add an npm Automation token as the NPM_TOKEN repo secret, then re-run this workflow."
      - uses: oven-sh/setup-bun@v2
        if: ${{ env.NPM_TOKEN != '' }}
      - run: bun install
        if: ${{ env.NPM_TOKEN != '' }}
      - run: bunx semantic-release
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
